<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Train Status Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='status.css') }}">
</head>
<body>

<div class="container">

    <div class="status-card">
        <h2>Train Status</h2>

        {% if train %}
        <div class="status-details">

            <div class="detail-row">
                <span class="label">Train Name</span>
                <span class="value">{{ train }}</span>
            </div>

            <div class="detail-row">
                <span class="label">Current Status</span>
                <span class="badge 
                    {% if status == 'On Time' %}green
                    {% elif 'Delayed' in status %}orange
                    {% elif status == 'Cancelled' %}red
                    {% else %}blue
                    {% endif %}
                ">
                    {{ status }}
                </span>
            </div>

            <div class="detail-row">
                <span class="label">Platform</span>
                <span class="value">Platform {{ platform }}</span>
            </div>

        </div>

        {% else %}
            <p class="no-data">No train selected. Please search again.</p>
        {% endif %}

        <div class="buttons">
            <a href="/" class="btn">Search Again</a>
            <a href="{{ url_for('home') }}" class="btn secondary">Home</a>
        </div>

    </div>

</div>

</body>
</html>
